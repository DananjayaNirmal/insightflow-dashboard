<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
    <title>Document</title>
  </head>
  <body>
    <section class="container w-50 py-5 my-5 text-center bg-light">
      <div>
        <div>
          <h2>Create Your Account</h2>
          <p>
            Discover your business insight and find your success with
            InsightFlow.
          </p>
          <p>Join with InsightFlow family</p>
        </div>
      </div>
      <div class = "container w-75">
        <form>
            <input type="text" id="name" placeholder="your name" class="form-control"/></br>
            <input type="email" id="email" placeholder="email address" class="form-control"/></br>
            <input type="password" id="password" placeholder="enter the password" class="form-control" /></br>
            <div class="form-text">
            Your password must be 8-20 characters long, contain letters and numbers, and must not contain spaces, special characters, or emoji.
            </div>
            <button id="btn-submit" class = "btn btn-outline-primary mt-4 px-4 w-100">Submit</button>
        </form>
            <div class = "d-flex mt-5">
               <button class = "btn bg-transparent border-0">Already have an account? Login</button>
            </div> 
      </div> 
    </section>
  </body>
</html>
