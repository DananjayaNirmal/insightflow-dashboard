<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>

    <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <title>Document</title>
  </head>
  <body>
    <main class="container-float bg-light text-center">
      <nav class="navbar bg-body-tertiary mb-4">
        <div class="container-fluid">
          <img src="./assets/images/logo.png" alt="logo" style="width: 200px" />
          <ul class="navbar-nav">
            <li class="nav-item">
              <a class="nav-link active" aria-current="page" href="./instructions.html"
                >Read me first 📄</a
              >
            </li>
          </ul>
        </div>
      </nav>

      <div>
        <h1 class="text-primary">Discover insights with InsightFlow</h1>
      </div>

      <div class="m-5">
        <h5 class="mb-5">Choose or Drag and drop your sales report here📈</h5>
        <div class="border border-2 border-dashed rounded p-5 w-75 mx-auto">
          <input
            type="file"
            class="form-control"
            id="fileInput"
            accept=".xlsx,.xls,.csv"
          />
          <p class="mb-4 text-secondary">csv/ xls/ xlsx</p>
        </div>

        <button
          class="btn btn-outline-success my-5 py-3 col-4"
          id="analyze-data"
        >
          Click Here To Start Analyze 🪄
        </button>
        
      </div>
      <section>
        <div class="row m-4">
          <div
            class="col m-2 p-2 d-flex align-items-center justify-content-center shadow-lg rounded bg-body-tertiary rounded"
          >
            <div class="row">
              <p id="yearly-revenue">--</p>
              <hr class="border opacity-100 border-primary w-75 mx-auto" />
              <p>Yearly revenue</p>
            </div>
          </div>

          <div
            class="col m-2 p-2 d-flex align-items-center justify-content-center shadow-lg rounded bg-body-tertiary rounded"
            style="min-height: 100px"
          >
            <div class="row">
              <p id="sales-count">--</p>
              <hr class="border opacity-100 border-primary w-75 mx-auto" />
              <p>Total sales Count</p>
            </div>
          </div>
          <div
            class="col m-2 p-2 d-flex align-items-center justify-content-center shadow-lg rounded bg-body-tertiary"
          >
            <div class="row">
              <p id="average-order">--</p>
              <hr
                class="border opacity-100 border-primary w-75 mx-auto w-75 mx-auto"
              />
              <p>Average order value</p>
            </div>
          </div>
          <div
            class="col m-2 p-2 d-flex align-items-center justify-content-center shadow-lg rounded bg-body-tertiary rounded"
          >
            <div class="row">
              <p id="profit">--</p>
              <hr class="border opacity-100 border-primary w-75 mx-auto" />
              <p>Total profit</p>
            </div>
          </div>
          <div
            class="col m-2 p-2 d-flex align-items-center justify-content-center shadow-lg rounded bg-body-tertiary rounded"
          >
            <div class="row">
              <p id="growth">--</p>
              <hr class="border opacity-100 border-primary w-75 mx-auto" />
              <p>Growth</p>
            </div>
          </div>
        </div>

        <div class="row m-4">
          <div
            class="col-7 p-2 shadow-lg rounded shadow bg-body-tertiary"
            style="min-height: 300px"
          >
            <h5>Sales Chart</h5>
            <canvas id="topProductsChart"></canvas>
          </div>
          <div
            class="col-5 p-2 shadow-lg rounded shadow bg-body-tertiary d-flex flex-column gap-2 pt-3"
            style="min-height: 300px"
          >
            <canvas id="revenueChart"></canvas>
          </div>
        </div>
        
        <div class="my-5">
          <h5 class="m-3">🎯</h5>
          <p class="my-auto" id="more-insights"></p>
        </div>
        
        <div class="m-5">
          <h5 class="m-5">Top products</h5>
          <div class="w-50 mx-auto">
            <table class="table text-start" id="top-products">
              <thead>
                <tr>
                  <td scope="col">Product name & brand</th>

                  <td scope="col">Total revenue</th>
                </tr>
              </thead>
              <tbody
                class="table-group-divider border-secondary justify-content-start"
              >
                <tr>
                  <th scope="row">--</th>
                  <td>--</td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>

        <button
          class="btn btn-outline-primary my-5 py-2 col-2"
          id="download-pdf"
        >
          Download as a PDF
        </button>
      </section>

       <!--toast message-->
        <div class="toast-container position-fixed top-0 p-3">
        <div id="app-toast" class="toast align-items-center text-bg-primary border-0" role="alert">
          <div class="d-flex">
            <div class="toast-body" id="toast-body">
             
            </div>
            <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
          </div>
        </div>
      </div>
      <!--toast message-->

    </main>
    <script type="module" src="./assets/js/dashboard.js"></script>
  </body>
</html>
